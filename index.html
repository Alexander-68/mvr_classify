        if (right <= left) continue; // span lies entirely outside the visible window
        if (drawBand) {
          ctx.fillStyle = g.recordingFillColor;
          ctx.fillRect(left, y0, right - left, y1 - y0);
        }
        if (drawEdges) {
          ctx.strokeStyle = g.recordingEdgeColor;
          ctx.lineWidth = 1.5;
          if (inWindow(pStart)) edgeLine(pStart);
          if (end !== null && inWindow(pEnd)) edgeLine(pEnd);
        }
      }
    }

    // Snapshot ticks: short dashed verticals so they read distinctly from the
    // recording edges.
    if (drawSnaps && snaps.length) {
      ctx.save();
      ctx.strokeStyle = g.snapshotColor;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 3]);
      for (const ts of snaps) {
        const x = xOf(toPerf(ts));
        if (x <= x0 || x >= x1) continue;
        ctx.beginPath();
        ctx.moveTo(x, y0);
        ctx.lineTo(x, y1);
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  // Average one downsample group into a single sample: per-class mean of the
  // buffered values (nulls skipped; null if every value was null), timestamped
  // (and frame-tagged) with the latest sample in the group.
  function foldSampleGroup(buf) {
    const cols = buf[0].v.length;
    const v = new Array(cols);
    for (let i = 0; i < cols; i++) {
      let sum = 0, count = 0;
      for (const s of buf) { const x = s.v[i]; if (x != null) { sum += x; count++; } }
      v[i] = count ? sum / count : null;
    }
    const last = buf[buf.length - 1];
    return { t: last.t, v, frm: last.frm };
  }

  // Append one time sample (the current moving average of every class). Samples
  // are retained up to g.maxSamples (dropping only the very oldest) — not trimmed
  // to the visible window — so widening the strip or zooming the timeline out
  // reveals history that was collected but not previously shown. Then repaint.
  // With g.downsample > 1, incoming samples are buffered and only every Nth push
  // commits one averaged point (keeps the strip's stored history coarser).
  function pushGraphSample(state, indicators, t, frm) {
    const g = state.graph;
    const v = indicators.map((ind) => (ind.ma == null ? null : ind.ma));
    if (g.downsample > 1) {
      g.groupBuf.push({ t, v, frm });
      if (g.groupBuf.length < g.downsample) { drawGraph(state); return; }
      g.samples.push(foldSampleGroup(g.groupBuf));
      g.groupBuf.length = 0;
    } else {
      g.samples.push({ t, v, frm });
    }
    if (g.samples.length > g.maxSamples) {
      g.samples.splice(0, g.samples.length - g.maxSamples);
    }
    drawGraph(state);
  }

  // Widest the strip may grow: capped by the canvas right edge and by the nearest
  // cluster to the right that vertically overlaps it (so widening never overlaps).
  function graphMaxBaseW(state) {
    const scale = state.scale;
    const h = state.el.offsetHeight * scale;
    const myTop = state.top, myBottom = state.top + h;
    let limitRight = window.innerWidth;
    for (const o of clusters) {
      if (o === state) continue;
      const r = clusterRect(o);
      if (r.b <= myTop || r.t >= myBottom) continue; // no vertical overlap
      if (r.l >= state.left) limitRight = Math.min(limitRight, r.l);
    }
    return Math.max(MIN_GRAPH_W, (limitRight - state.left) / scale);
  }

  // Apply a new strip width: resize the box, re-measure the canvas, redraw. The
  // top-left stays pinned (the strip grows/shrinks rightward). Because the visible
  // window = width × msPerPx, a wider strip shows proportionally more history.
  function setGraphWidth(state, w) {
    const g = state.graph;
    g.baseW = clamp(w, MIN_GRAPH_W, graphMaxBaseW(state));
    state.el.querySelector('.graph').style.width = `${g.baseW}px`;
    sizeGraphCanvas(state);
    apply(state);
  }

  // Zoom the timeline by scaling msPerPx (how much history each pixel carries),
  // keeping the newest sample pinned to the right edge. factor < 1 zooms in (less
  // history, more detail); factor > 1 zooms out (more history).
  function applyTimelineZoom(state, factor) {
    const g = state.graph;
    g.msPerPx = clamp(g.msPerPx * factor, GRAPH_MIN_MS_PER_PX, GRAPH_MAX_MS_PER_PX);
    drawGraph(state);
  }

  // Right-edge resize handle: its own pointer gesture (stops propagation so the
  // cluster doesn't also treat it as a move), captured so the drag tracks even
  // past the handle. Persists the new width on release.
  function setupGraphResize(state, handle) {
    const g = state.graph;
    handle.addEventListener('pointerdown', (e) => {
      window.MvrOverlay?.reportInteractive();
      e.stopPropagation();
      e.preventDefault();
      handle.setPointerCapture(e.pointerId);
      g.resizing = { startX: e.clientX, startW: g.baseW };
    });
    handle.addEventListener('pointermove', (e) => {
      if (!g.resizing) return;
      const dx = (e.clientX - g.resizing.startX) / state.scale;
      setGraphWidth(state, g.resizing.startW + dx);
    });
    function end(e) {
      if (!g.resizing) return;
      g.resizing = null;
      try { handle.releasePointerCapture(e.pointerId); } catch (_) {}
      markHome(state);
      saveLayout();
    }
    handle.addEventListener('pointerup', end);
    handle.addEventListener('pointercancel', end);
  }

  // Shared cluster bootstrap: mount the element, build its gesture state, wire up
  // the pointer/wheel handlers, register it (for the no-overlap rule), and apply
  // any saved layout. Both button clusters and readout clusters go through here.
  function initCluster(id, el, left, top, exclusive = true, transient = false) {
    stage.appendChild(el);

    const state = {
      el,
      id,
      left,
      top,
      homeLeft: left, // intended position; where the cluster returns to after a
      homeTop: top,   // transient viewport shrink (e.g. on-screen keyboard)
      scale: 1,
      horizontal: false,   // orientation, persisted; a row when true, else a column.
                           // Set by a two-finger twist or by docking (which lays
                           // the cluster along its edge); it is sticky otherwise.
      dock: null,          // 'top' | 'bottom' | 'left' | 'right' | null — docked edge.
                           // top/bottom force a row, left/right force a column.
      exclusive,            // true: one selection per cluster; false: independent
      transient,            // true: a pop-up submenu — not built at page load and
                            // its selection is discarded, but its position persists
      markerOverride: null, // submenu root marker; ordinary clusters leave null
      modifierPath: [],      // submenu ancestor labels already chosen
      warnRecording: true,   // does an event from this cluster raise the
                             // not-recording warning? Config `recordingWarning:
                             // false` opts a cluster out; submenus inherit it.
      minimizable: !!el.querySelector('.cluster-min-toggle'),
      minimized: false,
      selected: null,       // last-selected button (only meaningful when exclusive)
      pointers: new Map(), // pointerId -> {x, y}
      mode: null,          // null (pending) | 'drag' | 'pinch'
      tapButton: null,
      tapToggle: null,
      moved: false,
      longPress: false,      // did the single-pointer hold cross LONG_PRESS_MS?
      longPressTimer: null,
      holdActionDone: false, // did the long-hold already open/close a submenu?
      dragLocked: false,     // once a submenu spawned mid-hold, don't drag parent
      startX: 0, startY: 0,
      startLeft: 0, startTop: 0,
      pinchStartDist: 0, pinchStartScale: 1,
      pinchStartAngle: 0,   // two-finger angle baseline, re-based after each flip
      focalX: 0, focalY: 0, // pinch focal point in cluster-local (pre-scale) coords
    };

    apply(state);
    setupCluster(state);
    clusters.push(state);
    state.restored = restoreLayout(state); // saved layout
    if (!state.restored && state.minimizable && !transient) {
      applyMinimizedClass(state, true);
      capScaleToCanvas(state);
      clampIntoCanvas(state);
      apply(state);
      markHome(state);
    }
    return state;
  }

  function apply(state) {
    state.el.style.left = `${state.left}px`;
    state.el.style.top = `${state.top}px`;
    state.el.style.transform = `scale(${state.scale})`;
  }

  // Remember a cluster's current position as its "home" — the spot it returns to
  // once a transient viewport shrink (the on-screen keyboard) that clamped it
  // inward goes away. Only real gestures call this; resize clamping never does,
  // so the intended position survives the keyboard.
  function markHome(state) {
    state.homeLeft = state.left;
    state.homeTop = state.top;
  }

  // Toggle a cluster between the default vertical stack and a horizontal row.
  // Adding/removing the class reflows the element synchronously, so callers can
  // re-measure offsetWidth/Height right after to reposition against the change.
  function setOrientation(state, horizontal) {
    if (state.horizontal === horizontal) return;
    state.horizontal = horizontal;
    state.el.classList.toggle('horizontal', horizontal);
  }

  function buttonLabel(btn) {
    return btn.querySelector('.label')?.textContent ?? btn.textContent;
  }

  // Record an interaction on the active study's timeline. The marker is the
  // button's label text; `status`, when given, tags how the (de)selection
  // happened. Best-effort and a no-op off-device.
  function injectEvent(state, btn, status) {
    const label = buttonLabel(btn);
    // A submenu cluster fixes the marker to its root host and reports the
    // selected path as modifier, modifier2, modifier3... Ordinary clusters use
    // the button as marker.
    const evt = state.markerOverride ? { marker: state.markerOverride } : { marker: label };
    if (state.markerOverride) {
      const path = [...state.modifierPath, label];
      path.forEach((part, i) => {
        evt[i === 0 ? 'modifier' : `modifier${i + 1}`] = part;
      });
    }
    if (status) evt.status = status;
    if (state.warnRecording) maybeShowRecordingWarning();
    window.MvrOverlay?.injectTimelineEvent(JSON.stringify(evt));
  }

  // Select a button (ding). `status` is 'on' for a long-press select and
  // omitted for a plain short-tap select.
  function selectButton(state, btn, status) {
    // Exclusive clusters keep a single selection (clear the previous one);
    // non-exclusive clusters let each button toggle independently. Selection only
    // scales the label text, so the button box and cluster layout don't change.
    if (state.exclusive && state.selected && state.selected !== btn) {
      const previous = state.selected;
      previous.classList.remove('selected');
      const previousHost = submenuHosts.get(previous);
      if (previousHost?.submenu) closeSubmenu(previousHost);
    }
    btn.classList.add('selected');
    state.selected = btn;
    // Fire the ding off the critical path so the selected state paints
    // immediately — rapid taps stay responsive and we don't wait on audio.
    setTimeout(playDing, 0);
    injectEvent(state, btn, status);
  }

  // Deselect the already-selected button (dong). `status` is 'finish' for a
  // short-tap unselect and 'off' for a long-press unselect.
  function unselectButton(state, btn, status) {
    btn.classList.remove('selected');
    if (state.selected === btn) state.selected = null;
    setTimeout(playDong, 0);
    injectEvent(state, btn, status);
  }

  // Cancel a pending long-press timer (a drag or a second finger disqualifies
  // the hold). Leaves state.longPress as-is; callers reset it where needed.
  function clearLongPress(state) {
    if (state.longPressTimer) {
      clearTimeout(state.longPressTimer);
      state.longPressTimer = null;
    }
  }

  // The long-press timer fired while the finger is still down. The whole
  // long-press resolves right here — mid-hold — so there's immediate feedback
  // and no guessing how long to hold or waiting for release. A submenu host pops
  // its submenu open (or tears it down); every other button just toggles its own
  // selection with an on/off status. Once resolved, the press is committed: the
  // parent cluster can no longer be dragged by this gesture (dragLocked) and
  // pointer-up won't re-toggle it (holdActionDone). To reposition instead, start
  // dragging before the threshold — an early drag cancels this timer.
  function fireLongPress(state) {
    state.longPress = true;
    // Only a clean single-finger hold on a button qualifies.
    if (state.mode === 'drag' || state.mode === 'pinch') return;
    if (state.pointers.size !== 1) return;
    const btn = state.tapButton;
    if (!btn) return;
    const host = submenuHosts.get(btn);
    if (host) {
      if (btn.classList.contains('selected') && host.submenu) {
        // Already open: a fresh long-hold tears it down.
        unselectButton(state, btn, 'off');
        closeSubmenu(host);
      } else {
        // Pop the submenu open now, while still pressing.
        selectButton(state, btn, 'on');
        openSubmenu(host);
      }
    } else if (btn.classList.contains('selected')) {
      unselectButton(state, btn, 'off');
    } else {
      selectButton(state, btn, 'on');
    }
    state.holdActionDone = true;
    state.dragLocked = true;
  }

  // (Re)establish the two-finger baseline: current spread (for zoom), angle (for
  // twist), and focal point (kept pinned under the fingers' midpoint). Called at
  // the start of a pinch and again after a twist-flip so zoom and twist continue
  // smoothly across the orientation change.
  function rebasePinch(state) {
    const [p0, p1] = [...state.pointers.values()];
    const m = midpoint(p0, p1);
    state.pinchStartDist = dist(p0, p1) || 1;
    state.pinchStartScale = state.scale;
    state.pinchStartAngle = angleBetween(p0, p1);
    state.focalX = (m.x - state.left) / state.scale;
    state.focalY = (m.y - state.top) / state.scale;
  }

  function beginPinch(state) {
    state.mode = 'pinch';
    state.tapButton = null;
    state.el.classList.remove('dragging');
    clearLongPress(state);
    state.longPress = false;
    // A two-finger gesture is free-form manipulation (zoom / twist / move), so
    // the cluster leaves any docked edge. Its orientation stays put (sticky) —
    // only a deliberate twist changes it.
    state.dock = null;
    rebasePinch(state);
    // Baseline for a graph's timeline pinch-zoom (msPerPx changes off this).
    if (state.graph) state.graph.pinchStartMsPerPx = state.graph.msPerPx;
  }

  // A two-finger twist past TWIST_FLIP_RAD flips orientation (row <-> column).
  // The reflow changes the box size, so re-clamp into the canvas and re-base the
  // pinch to the new geometry, then carry on within the same gesture.
  function twistDuringPinch(state) {
    const [p0, p1] = [...state.pointers.values()];
    let dA = angleBetween(p0, p1) - state.pinchStartAngle;
    dA = Math.atan2(Math.sin(dA), Math.cos(dA)); // wrap to [-PI, PI]
    if (Math.abs(dA) < TWIST_FLIP_RAD) return;
    const m = midpoint(p0, p1);
    setOrientation(state, !state.horizontal);
    // The box anchors at its top-left, and the flip swaps its width/height, so
    // holding the corner fixed would fling the cluster's center out from under
    // the fingers. Re-center the freshly reflowed box on the fingers' midpoint.
    state.left = m.x - (state.el.offsetWidth * state.scale) / 2;
    state.top = m.y - (state.el.offsetHeight * state.scale) / 2;
    clampIntoCanvas(state);
    apply(state);
    markHome(state);
    rebasePinch(state); // fresh geometry + twist baseline for the next flip
  }

  function setupCluster(state) {
    const el = state.el;

    el.addEventListener('pointerdown', (e) => {
      // Claim this gesture for the web UI so the native layer doesn't treat it
      // as a click-through to the camera controls underneath.
      window.MvrOverlay?.reportInteractive();
      el.setPointerCapture(e.pointerId);
      state.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

      if (state.pointers.size === 1) {
        state.mode = null;
        state.moved = false;
        const toggle = e.target.closest('.cluster-id-label, .cluster-min-toggle');
        state.tapToggle = toggle && el.contains(toggle) ? toggle : null;
        state.tapButton = state.tapToggle ? null : e.target.closest('.cluster-button');
        state.startX = e.clientX;
        state.startY = e.clientY;
        state.startLeft = state.left;
        state.startTop = state.top;
        // Start the long-press clock; a drag or second finger cancels it. When
        // it fires (finger still down, no drag), a submenu host pops its submenu
        // open right then — see fireLongPress.
        state.longPress = false;
        state.holdActionDone = false;
        state.dragLocked = false;
        clearLongPress(state);
        if (state.tapButton) {
          state.longPressTimer = setTimeout(() => fireLongPress(state), LONG_PRESS_MS);
        }
      } else if (state.pointers.size === 2) {
        beginPinch(state);
      }
    });

    el.addEventListener('pointermove', (e) => {
      const p = state.pointers.get(e.pointerId);
      if (!p) return;
      p.x = e.clientX;
      p.y = e.clientY;

      if (state.mode === 'pinch' && state.pointers.size >= 2) {
        const [p0, p1] = [...state.pointers.values()];
        const m = midpoint(p0, p1);
        // A graph pinches its TIMELINE, not its box: spreading the fingers zooms
        // in (less history, more detail), pinching zooms out (more history).
        if (state.graph) {
          const ratio = dist(p0, p1) / state.pinchStartDist;
          state.graph.msPerPx = clamp(
            state.graph.pinchStartMsPerPx / ratio, GRAPH_MIN_MS_PER_PX, GRAPH_MAX_MS_PER_PX);
          drawGraph(state);
          return;
        }
        // Twist flips orientation (and re-bases the pinch); spread zooms; the
        // midpoint translates. All three can happen in one two-finger gesture.
        twistDuringPinch(state);
        const ratio = dist(p0, p1) / state.pinchStartDist;
        // Keep the focal point pinned under the fingers' midpoint.
        applyZoom(state, state.pinchStartScale * ratio, m.x, m.y, state.focalX, state.focalY);
        return;
      }

      if (state.pointers.size === 1) {
        const dx = e.clientX - state.startX;
        const dy = e.clientY - state.startY;
        if (!state.moved && !state.dragLocked && Math.hypot(dx, dy) > DRAG_THRESHOLD) {
          state.moved = true;
          state.mode = 'drag';
          el.classList.add('dragging');
          clearLongPress(state); // a drag is not a hold
          state.longPress = false;
        }
        if (state.mode === 'drag') {
          let w = el.offsetWidth * state.scale;
          let h = el.offsetHeight * state.scale;
          const desiredL = state.startLeft + dx;
          const desiredT = state.startTop + dy;

          // --- Dock a free cluster: shove one of its edges off-screen by
          // EDGE_FORCE to snap it to that edge. Docking lays the cluster ALONG
          // the edge — top/bottom => a horizontal row, left/right => a vertical
          // column — so orientation follows the edge (and stays that way after,
          // sticky). The largest overshoot wins so a corner picks one edge.
          if (state.dock === null) {
            const overTop    = Math.max(0, -desiredT);
            const overBottom = Math.max(0, desiredT + h - window.innerHeight);
            const overLeft   = Math.max(0, -desiredL);
            const overRight  = Math.max(0, desiredL + w - window.innerWidth);
            let pick = null; // [edge, horizontal, overshoot]
            for (const c of [['top', true, overTop], ['bottom', true, overBottom],
                             ['left', false, overLeft], ['right', false, overRight]]) {
              if (c[2] > EDGE_FORCE && (!pick || c[2] > pick[2])) pick = c;
            }
            if (pick) {
              setOrientation(state, pick[1]); // reflows synchronously
              state.dock = pick[0];
              w = el.offsetWidth * state.scale; // re-measure the flipped box
              h = el.offsetHeight * state.scale;
              // Snap to the edge and re-base the drag onto that pinned spot, so
              // further motion (and the undock test) is measured from the dock.
              const slot = dockSlot(state, w, h, desiredL, desiredT);
              state.left = slot.l; state.top = slot.t;
              state.startX = e.clientX; state.startY = e.clientY;
              state.startLeft = slot.l; state.startTop = slot.t;
              apply(state);
              return; // settle the snap this frame; resume dragging next move
            }
          }

          let pL, pT;
          if (state.dock === null) {
            pL = clamp(desiredL, 0, Math.max(0, window.innerWidth - w));
            pT = clamp(desiredT, 0, Math.max(0, window.innerHeight - h));
          } else {
            // Docked: pin along the edge (sliding to follow the finger), and
            // undock once the finger pulls the box off that edge by more than
            // EDGE_FORCE. Undocking keeps the orientation (sticky).
            const slot = dockSlot(state, w, h, desiredL, desiredT);
            const off =
              state.dock === 'top'    ? desiredT - slot.t :
              state.dock === 'bottom' ? slot.t - desiredT :
              state.dock === 'left'   ? desiredL - slot.l :
                                        slot.l - desiredL;
            if (off > EDGE_FORCE) {
              state.dock = null;
              pL = clamp(desiredL, 0, Math.max(0, window.innerWidth - w));
              pT = clamp(desiredT, 0, Math.max(0, window.innerHeight - h));
            } else {
              pL = clamp(slot.l, 0, Math.max(0, window.innerWidth - w));
              pT = clamp(slot.t, 0, Math.max(0, window.innerHeight - h));
            }
          }

          const fits = (l, t) => !hitsOtherCluster(state, { l, t, r: l + w, b: t + h });
          // Slide along whichever axis stays clear so clusters never overlap.
          if (fits(pL, pT)) { state.left = pL; state.top = pT; }
          else if (fits(pL, state.top)) { state.left = pL; }
          else if (fits(state.left, pT)) { state.top = pT; }
          apply(state);
        }
      }
    });

    function onUp(e) {
      if (!state.pointers.has(e.pointerId)) return;
      state.pointers.delete(e.pointerId);
      try { el.releasePointerCapture(e.pointerId); } catch (_) {}

      // Pinch -> single finger: keep dragging with the remaining pointer,
      // rebasing so the cluster doesn't jump.
      if (state.pointers.size === 1 && state.mode === 'pinch') {
        const pt = [...state.pointers.values()][0];
        state.mode = 'drag';
        state.moved = true;
        state.startX = pt.x;
        state.startY = pt.y;
        state.startLeft = state.left;
        state.startTop = state.top;
        return;
      }

      if (state.pointers.size === 0) {
        clearLongPress(state);
        const wasTap = state.mode !== 'drag' && state.mode !== 'pinch';
        const handledOnHold = state.holdActionDone;
        const btn = state.tapButton;
        const toggle = state.tapToggle;
        el.classList.remove('dragging');
        state.mode = null;
        state.tapButton = null;
        state.tapToggle = null;
        state.moved = false;
        state.longPress = false;
        state.holdActionDone = false;
        state.dragLocked = false;
        if (handledOnHold) {
          // The long-hold already opened/closed the submenu while pressing and
          // locked out the drag, so the parent didn't move — nothing to do here.
          return;
        }
        if (wasTap && toggle) {
          toggleMinimized(state);
          return;
        }
        if (wasTap && btn) {
          // Only short taps reach here — every long-press resolves mid-hold in
          // fireLongPress. A short tap on a selected button deselects it and
          // finishes with "finish" (dong), tearing down a host's submenu too;
          // on an unselected button it selects bare (ding, no status/submenu).
          const host = submenuHosts.get(btn);
          if (host) {
            if (btn.classList.contains('selected')) {
              unselectButton(state, btn, 'finish');
              closeSubmenu(host);
            } else {
              selectButton(state, btn, undefined);
              // openOnTap hosts pop their submenu on a plain short tap too, not
              // only on long-press. The next short tap hits the selected branch
              // above, which deselects ('finish') and tears the submenu down.
              if (host.openOnTap) openSubmenu(host);
            }
          } else if (btn.classList.contains('selected')) {
            unselectButton(state, btn, 'finish');
          } else {
            selectButton(state, btn, undefined);
          }
        } else {
          markHome(state);  // a drag/pinch set a new intended position
          saveLayout();     // persist the changed layout
        }
      }
    }
    el.addEventListener('pointerup', onUp);
    el.addEventListener('pointercancel', onUp);

    // Mouse-wheel zoom, focused on the cursor position — except a graph zooms its
    // timeline (scroll up = zoom in / less history, down = zoom out / more).
    el.addEventListener('wheel', (e) => {
      e.preventDefault();
      window.MvrOverlay?.reportInteractive();
      if (state.graph) {
        applyTimelineZoom(state, Math.exp(e.deltaY * 0.0015));
        saveLayout();
        return;
      }
      const factor = Math.exp(-e.deltaY * 0.0015);
      const localX = (e.clientX - state.left) / state.scale;
      const localY = (e.clientY - state.top) / state.scale;
      applyZoom(state, state.scale * factor, e.clientX, e.clientY, localX, localY);
      saveLayout();
    }, { passive: false });
  }

  // --- Modifier submenus ---------------------------------------------------
  // A host button can pop open an exclusive submenu of modifiers on long-press.
  // Nested submenu hosts use the same config map: if any newly-created submenu
  // contains a button whose label is a key in `submenus`, that button becomes a
  // host too. Events keep the root marker fixed and report the selected path as
  // modifier, modifier2, modifier3...
  const submenuHosts = new Map();
  const submenuSpecs = new Map();

  function submenuSpecFromConfig(spec) {
    const modifiers = Array.isArray(spec) ? spec : (Array.isArray(spec?.modifiers) ? spec.modifiers : []);
    return {
      modifiers,
      openOnTap: !Array.isArray(spec) && spec?.openOnTap === true,
    };
  }

  function slug(value) {
    return String(value).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'submenu';
  }

  function submenuId(marker, modifierPath) {
    return `${[marker, ...modifierPath].map(slug).join('-')}-modifier`;
  }

  // Register every matching button in a cluster as a submenu host. Top-level
  // hosts start a marker (`Injection` -> modifier). Hosts inside a submenu
  // extend that submenu's event path (`Injection` -> `Hemostasis` -> modifier2).
  function registerSubmenuHostsForCluster(state) {
    for (const btn of state.el.querySelectorAll('.cluster-button')) {
      const label = buttonLabel(btn).trim();
      const spec = submenuSpecs.get(label);
      if (!spec) continue;

      const marker = state.markerOverride || label;
      const modifierPath = state.markerOverride ? [...state.modifierPath, label] : [];
      // Avoid endless cycles when menu labels refer back to an ancestor.
      if (state.markerOverride && [state.markerOverride, ...state.modifierPath].includes(label)) continue;

      submenuHosts.set(btn, {
        marker,
        modifierPath,
        id: submenuId(marker, modifierPath),
        modifiers: spec.modifiers,
        openOnTap: spec.openOnTap,
        title: label,
        submenu: null,
        cluster: state,
      });
    }
  }

  // Build the clusters and submenus from a loaded config object. A cluster's
  // `exclusive` defaults to true (matches the original single-select "segments"
  // cluster); set it false in the config for independent multi-select. Optional
  // per-cluster `left`/`top` override the default spawn spot.
  function buildFromConfig(config) {
    buildRecordingWarning(config.recordingWarning);

    const built = [];
    for (const c of (config.clusters || [])) {
      const cl = createCluster(
        c.id, c.buttons || [],
        typeof c.left === 'number' ? c.left : 40,
        typeof c.top === 'number' ? c.top : 100,
        c.exclusive !== false,
      );
      // Opt a cluster out of the not-recording warning with recordingWarning:false.
      cl.warnRecording = c.recordingWarning !== false;
      built.push(cl);
    }

    // Fresh-start placement: keep the first cluster at its default spot and push
    // each later cluster toward the right edge, clear of the first, so they don't
    // start out overlapping. Skipped for a cluster restored from a saved layout
    // or given an explicit position in the config.
    const first = built[0];
    for (let i = 1; i < built.length && first; i++) {
      const c = built[i];
      if (c.restored || typeof config.clusters[i].left === 'number') continue;
      c.left = Math.max(
        first.left + first.el.offsetWidth + 24,
        window.innerWidth - c.el.offsetWidth - 40,
      );
      clampIntoCanvas(c);
      moveClusterToOpenSpace(c);
      apply(c);
      markHome(c);
    }

    // Each key in `submenus` is a host button's label. The value is either the
    // modifier array directly, or an object { modifiers: [...], openOnTap: bool }
    // — openOnTap makes the submenu pop on a plain short tap, not just a
    // long-press. The bare-array form keeps openOnTap off. The same map is used
    // for nested popups: submenu buttons are registered as hosts when their
    // transient cluster is created.
    submenuSpecs.clear();
    for (const [label, spec] of Object.entries(config.submenus || {})) {
      submenuSpecs.set(label, submenuSpecFromConfig(spec));
    }
    built.forEach(registerSubmenuHostsForCluster);

    // Build the vision-AI class-indicator cluster (if configured). It defaults to
    // a horizontal "line of squares" near the top; drag/pinch/dock/persist reuse
    // the shared cluster machinery. Kept in `aiCluster` so the SSE stream can push
    // live scores into it.
    if (config.aiScope && (config.aiScope.classes || []).length) {
      const ai = config.aiScope;
      // Per-class above-threshold value (percent), clamped [0, 99] so the
      // (100 - thr) headroom denominator is never zero. Default 50 when a class
      // omits `threshold`. Both the indicator accumulator and the graph's
      // reference lines read this off each class.
      ai.classes.forEach((c) => {
        c.threshold = clamp(typeof c.threshold === 'number' ? c.threshold : 50, 0, 99);
      });
      aiCluster = createReadoutCluster(
        ai.id || 'ai_classes', ai.classes,
        typeof ai.left === 'number' ? ai.left : 40,
        typeof ai.top === 'number' ? ai.top : 20,
      );
      // Moving-average window (packets) for the displayed percent. Raw scores are
      // averaged over the last N packets in float; clamp to >=1 (1 == no smoothing).
      aiCluster.maSize = Math.max(1, Math.round(
        typeof ai.movingAverage === 'number' ? ai.movingAverage : 12));
      // Default fresh-start orientation: a line of squares. A saved layout (or a
      // later twist/dock) overrides this; only apply it when nothing was restored.
      if (!aiCluster.restored) {
        setOrientation(aiCluster, true);
        clampIntoCanvas(aiCluster);
        apply(aiCluster);
        markHome(aiCluster);
      }
      // Optional history graph: a long button-styled strip that plots each
      // class's moving-averaged score over time. Enabled by an `aiScope.graph`
      // object (or `true` for defaults); shares the class list/order with the
      // squares so a sample's value columns line up with the graph classes.
      if (ai.graph) {
        const g = typeof ai.graph === 'object' ? ai.graph : {};
        aiGraph = createGraphCluster(
          g.id || 'ai_graph', ai.classes,
          typeof g.left === 'number' ? g.left : (typeof ai.left === 'number' ? ai.left : 40),
          typeof g.top === 'number' ? g.top : 120,
          {
            width: typeof g.width === 'number' ? g.width : 320,
            height: typeof g.height === 'number' ? g.height : 84,
            windowSeconds: typeof g.windowSeconds === 'number' ? g.windowSeconds : 30,
            // In-memory sample retention cap (across the whole session, not just
            // the visible window); dropping only the oldest beyond it.
            maxSamples: typeof g.maxSamples === 'number' && g.maxSamples > 0
              ? Math.round(g.maxSamples) : GRAPH_MAX_SAMPLES_DEFAULT,
            // Downsample factor: average every N incoming samples into 1 stored
            // point (default 1 = keep every sample). aiScope feeds ~60/s, so 12
            // yields ~5 stored points/s.
            downsample: typeof g.downsample === 'number' && g.downsample > 0
              ? Math.round(g.downsample) : 1,
            // Threshold reference lines are derived per-class (see createGraphCluster).
            // Recording-event overlay colors: only what's set in config is drawn.
            // Omit a color to hide that element (band / edges / snapshot ticks).
            recordingFillColor: typeof g.recordingFillColor === 'string' ? g.recordingFillColor : null,
            recordingEdgeColor: typeof g.recordingEdgeColor === 'string' ? g.recordingEdgeColor : null,
            snapshotColor: typeof g.snapshotColor === 'string' ? g.snapshotColor : null,
          },
        );
        if (!aiGraph.restored) {
          clampIntoCanvas(aiGraph);
          moveClusterToOpenSpace(aiGraph); // don't start on top of the squares
          apply(aiGraph);
          markHome(aiGraph);
        }
      }
      // Start hidden — they appear only while inference data is flowing. Hide
      // AFTER placement above so those steps can still measure the boxes.
      setAiVisible(false);
    }
  }

  // The vision-AI indicator cluster and history graph, once built. The SSE
  // stream updates both.
  let aiCluster = null;
  let aiGraph = null;
  // True while a video is actively recording (between rec_start/rec_resume and the
  // next rec_pause/rec_stop). Gates per-video accumulation and swaps the .ind-acc
  // readout from per-study to per-video (see handleRecordingAcc / renderAcc).
  let recordingActive = false;
  // Latest AI model name seen on the inference stream (payload.mdl); stamped
  // onto the per-video summary event.
  let aiModel = null;

  // Fail-loud banner shown when the config can't be loaded. The file is the sole
  // source of menu content, so on failure we say why rather than come up blank.
  function showConfigError(err) {
    const box = document.createElement('div');
    box.style.cssText = [
      'position:fixed', 'left:50%', 'top:50%', 'transform:translate(-50%,-50%)',
      'max-width:80vw', 'padding:16px 20px', 'border:2px solid #ffdd00',
      'border-radius:10px', 'background:rgba(0,0,0,0.75)', 'color:#fff',
      'font-family:system-ui,sans-serif', 'font-size:16px', 'line-height:1.4',
      'text-align:center', 'z-index:9999', 'pointer-events:none',
    ].join(';');
    box.textContent = `Could not load mvr_annotate.json — ${err.message}`;
    stage.appendChild(box);
  }

  // Load the menu content (clusters + submenus), then build the UI. The config
  // file is the single source of truth: if it can't be fetched or parsed, fail
  // loud (show the error, build nothing) rather than guess a layout.
  async function init() {
    let config;
    try {
      const res = await fetch('mvr_annotate.json', { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      config = await res.json();
    } catch (err) {
      showConfigError(err);
      return;
    }
    buildFromConfig(config);
  }

  // Position a freshly opened submenu in open space that doesn't overlap any
  // other cluster: preferring beside its host (right, then left, then below /
  // above), then scanning the whole canvas for any clear slot, and finally —
  // only if nothing is clear — sitting beside the host anyway.
  function placeSubmenuInOpenSpace(sub, host) {
    const gap = 16;
    const w = sub.el.offsetWidth * sub.scale;
    const h = sub.el.offsetHeight * sub.scale;
    const hostW = host.el.offsetWidth * host.scale;
    const hostH = host.el.offsetHeight * host.scale;
    const maxL = Math.max(0, window.innerWidth - w);
    const maxT = Math.max(0, window.innerHeight - h);
    const fits = (l, t) => !hitsOtherCluster(sub, { l, t, r: l + w, b: t + h });
    const place = (l, t) => { sub.left = clamp(l, 0, maxL); sub.top = clamp(t, 0, maxT); };

    // Preferred anchors beside/around the host.
    const anchors = [
      [host.left + hostW + gap, host.top],   // right
      [host.left - w - gap, host.top],       // left
      [host.left, host.top + hostH + gap],   // below
      [host.left, host.top - h - gap],       // above
    ];
    for (const [l, t] of anchors) {
      const cl = clamp(l, 0, maxL), ct = clamp(t, 0, maxT);
      if (fits(cl, ct)) { place(cl, ct); return; }
    }
    // Grid scan for any open slot anywhere on the canvas.
    for (let t = 0; t <= maxT; t += 24) {
      for (let l = 0; l <= maxL; l += 24) {
        if (fits(l, t)) { place(l, t); return; }
      }
    }
    // Nothing clear — sit beside the host (right if it fits, else left).
    let l = host.left + hostW + gap;
    if (l + w > window.innerWidth) l = host.left - w - gap;
    place(l, host.top);
  }

  function openSubmenu(host) {
    if (host.submenu) return; // already open
    const sub = createCluster(host.id, host.modifiers, 0, 0, true, true, host.title);
    sub.markerOverride = host.marker;
    sub.modifierPath = [...host.modifierPath];
    sub.warnRecording = host.cluster.warnRecording; // inherit opt-out from host
    host.submenu = sub;
    registerSubmenuHostsForCluster(sub);
    // Reopen at the saved spot when we have one and it's still clear; otherwise
    // find open space beside the host. Persist the chosen spot either way so it
    // is remembered next time.
    if (!restoreLayout(sub) || hitsOtherCluster(sub, clusterRect(sub))) {
      placeSubmenuInOpenSpace(sub, host.cluster);
      clampIntoCanvas(sub);
      apply(sub);
      markHome(sub);
    }
    saveLayout();
  }

  function closeSubmenu(host) {
    if (!host.submenu) return;
    const sub = host.submenu;
    for (const btn of sub.el.querySelectorAll('.cluster-button')) {
      const childHost = submenuHosts.get(btn);
      if (childHost?.submenu) closeSubmenu(childHost);
      submenuHosts.delete(btn);
    }
    const i = clusters.indexOf(sub);
    if (i !== -1) clusters.splice(i, 1);
    sub.el.remove();
    host.submenu = null;
  }

  // Re-derive a cluster's on-screen position from its intended "home", clamped
  // into the current viewport. Docked clusters re-pin to their edge (and restack)
  // so they ride flush with a shrinking bottom rather than floating into the
  // middle. Home itself is never touched here, so growing the viewport back
  // (keyboard closing) returns every cluster to exactly where it was left.
  function reflowIntoViewport(c) {
    const w = c.el.offsetWidth * c.scale;
    const h = c.el.offsetHeight * c.scale;
    const maxL = Math.max(0, window.innerWidth - w);
    const maxT = Math.max(0, window.innerHeight - h);
    if (c.dock === 'top') {
      c.left = clamp(c.homeLeft, 0, maxL);
      c.top = clamp(dockAnchor(c, 'top', c.left, w, c.homeTop, h), 0, maxT);
    } else if (c.dock === 'bottom') {
      c.left = clamp(c.homeLeft, 0, maxL);
      c.top = clamp(dockAnchor(c, 'bottom', c.left, w, c.homeTop, h) - h, 0, maxT);
    } else if (c.dock === 'left') {
      c.left = 0;
      c.top = clamp(c.homeTop, 0, maxT);
    } else if (c.dock === 'right') {
      c.left = maxL;
      c.top = clamp(c.homeTop, 0, maxT);
    } else {
      c.left = clamp(c.homeLeft, 0, maxL);
      c.top = clamp(c.homeTop, 0, maxT);
    }
  }

  // On viewport resize (including the on-screen keyboard opening/closing), reflow
  // every cluster from its home. Two passes let stacked docked clusters settle
  // against each other regardless of iteration order.
  window.addEventListener('resize', () => {
    for (let pass = 0; pass < 2; pass++) {
      for (const c of clusters) reflowIntoViewport(c);
    }
    for (const c of clusters) apply(c);
    if (recordingWarning) {
      capRecordingWarningScale(recordingWarning);
      clampRecordingWarningLayout(recordingWarning);
      applyRecordingWarningLayout(recordingWarning);
    }
  });

  // --- Vision-AI inference stream ------------------------------------------
  // The server pushes each UDP inference packet (one JSON string) down an SSE
  // connection as it arrives: C process -UDP-> AiVisionUdpBridge -SSE-> here.
  // Each packet's `det` array carries per-class detections ({cls, scr}); we push
  // each score into its class indicator as a 0..100%. EventSource auto-reconnects
  // if the connection drops.

  // Each packet marks activity: reveal the live cluster + graph and (re)arm a
  // timer. When the stream goes silent for AI_IDLE_HIDE_MS, hide the live
  // indicator squares (they carry no meaning once data stops) but KEEP the
  // history graph on screen so the user can still study the trace. The graph
  // therefore lingers after the stream stops; it is cleared only on page reload
  // (or a fresh study). display:none also drops the squares from the no-overlap
  // checks while hidden, which is what we want.
  const AI_IDLE_HIDE_MS = 2000;
  let aiIdleTimer = null;

  function setAiVisible(visible) {
    if (aiCluster) aiCluster.el.style.display = visible ? '' : 'none';
    if (aiGraph) aiGraph.el.style.display = visible ? '' : 'none';
  }

  function noteAiActivity() {
    setAiVisible(true);
    if (aiIdleTimer) clearTimeout(aiIdleTimer);
    // Idle: hide only the live squares; leave the graph up for analysis.
    aiIdleTimer = setTimeout(() => {
      if (aiCluster) aiCluster.el.style.display = 'none';
    }, AI_IDLE_HIDE_MS);
  }

  // Above-threshold accumulator percent for one source: accumulated overshoot
  // over the accumulated headroom, rounded; null when nothing has accumulated.
  function accPercent(sum, count, thr) {
    if (!count) return null;
    return Math.round(sum / (count * (100 - thr)) * 100);
  }

  // Paint .ind-acc from whichever accumulator is active: per-video while a video
  // records, otherwise per-study. Repaints only on a change to avoid churn.
  function renderAcc(ind) {
    const pct = recordingActive
      ? accPercent(ind.vAccSum, ind.vAccCount, ind.threshold)
      : accPercent(ind.accSum, ind.accCount, ind.threshold);
    const txt = pct === null ? '–' : `${pct}%`;
    if (ind.accShown !== txt) {
      ind.accShown = txt;
      ind.accEl.textContent = txt;
    }
  }

  // Hysteresis for the displayed integer percent: keep showing the current value
  // until the true value moves at least this far from it, so a score dithering
  // around a rounding boundary (e.g. 45.5%) doesn't flicker between two integers.
  // 0.8 makes the shown number step UP once the fraction reaches .8 and step back
  // DOWN only at .2 — a dead band between 0.2 and 0.8 around each .5 boundary.
  const AI_PCT_HYSTERESIS = 0.8;

  function updateAiIndicators(payload) {
    if (!aiCluster) return;
    if (typeof payload.mdl === 'string') aiModel = payload.mdl; // stamp on summaries
    const byCls = new Map();
    for (const d of (payload.det || [])) byCls.set(d.cls, d.scr);
    for (const ind of aiCluster.indicators) {
      const scr = byCls.get(ind.cls);
      // Only classes present in this packet update; others keep their last value.
      if (typeof scr !== 'number') continue;
      const raw = clamp(scr, 0, 1) * 100;
      // Above-threshold accumulator: each raw sample contributes its overshoot
      // past the threshold (clamped at 0), out of the (100 - threshold) headroom.
      // The running percent is the accumulated overshoot over the accumulated
      // headroom — e.g. thr 55, samples 60 then 70 -> (5)/(45) = 11%, then
      // (5+15)/(45*2) = 22%. Accumulates for the whole session.
      const thr = ind.threshold;
      const over = Math.max(0, raw - thr);
      ind.accSum += over;
      ind.accCount += 1;
      // Per-video accumulator advances only while a video is recording.
      if (recordingActive) {
        ind.vAccSum += over;
        ind.vAccCount += 1;
      }
      renderAcc(ind);
      // Moving average over the last maSize raw percents (float). Push newest,
      // evict oldest once the window is full; keep a running sum to average in O(1).
      ind.buf.push(raw);
      ind.sum += raw;
      if (ind.buf.length > aiCluster.maSize) ind.sum -= ind.buf.shift();
      const v = ind.sum / ind.buf.length;
      // Keep the raw moving average for the history graph, and repaint the shown
      // integer only when it leaves the dead band around the current value.
      ind.ma = v;
      if (ind.disp === null || Math.abs(v - ind.disp) >= AI_PCT_HYSTERESIS) {
        ind.disp = Math.round(v);
        ind.pctEl.textContent = `${ind.disp}%`;
      }
    }
    // Collect one time sample of every class's moving average for the graph,
    // tagged with the source frame number (payload.frm) so a stored sample can
    // later be traced back to the exact inference frame.
    if (aiGraph) pushGraphSample(aiGraph, aiCluster.indicators, performance.now(), payload.frm);
    noteAiActivity(); // data arrived — show the cluster/graph and reset idle timer
  }

  function startAiStream() {
    if (!window.EventSource) return; // no SSE support — indicators stay idle
    const es = new EventSource('/ai/events');
    es.onmessage = (e) => {
      let payload;
      try {
        payload = JSON.parse(e.data); // one inference JSON string per event
      } catch (_) {
        return; // ignore malformed packets
      }
      updateAiIndicators(payload);
    };
    // onerror is non-fatal: the browser reconnects automatically.
  }

  // --- Recording / study event stream --------------------------------------
  // A second, independent SSE feed (/study/events) mirrors the device's study
  // timeline line-for-line: recording start/pause/resume/stop/error, snapshots,
  // study lifecycle, and signal changes (see MVR_homeweb_sse.md). We fold the
  // recording-relevant events into an in-memory array and overlay them on the
  // aiScope history graph (shaded recording spans, snapshot ticks). This buffer
  // is NON-persistent: it lives only for the current page session and is reset
  // when a new study begins.
  //
  // We store each event object verbatim and rely on its own epoch-ms `ts` as the
  // timebase — the graph overlay maps `ts` onto the sample clock via PERF_ORIGIN
  // (see drawRecordingOverlay), so no receive-time stamp is needed.
  const recordingEvents = [];

  // The `ev` names we keep for the graph overlay: recording lifecycle plus
  // snapshots. Other events (study_*, signal_*, ext, unknown) are pass-through.
  const RECORDING_EVENT_NAMES = new Set([
    'rec_start', 'rec_pause', 'rec_resume', 'rec_stop', 'rec_error', 'snapshot',
  ]);

  // Flip recording state: toggle the REC badges and re-render each .ind-acc from
  // the now-active accumulator (per-video while recording, per-study otherwise).
  function setRecording(active) {
    recordingActive = active;
    if (!aiCluster) return;
    for (const ind of aiCluster.indicators) {
      ind.recEl.style.display = active ? '' : 'none';
      renderAcc(ind);
    }
  }

  // Zero the per-video accumulators (on rec_start, and after a rec_stop inject).
  function resetVideoAcc() {
    if (!aiCluster) return;
    for (const ind of aiCluster.indicators) { ind.vAccSum = 0; ind.vAccCount = 0; }
  }

  // Emit a timeline event carrying each class's per-video above-threshold result
  // (fired on rec_pause and rec_stop, before the display reverts to per-study).
  function injectVideoAccEvent() {
    if (!aiCluster) return;
    const classes = aiCluster.indicators.map((ind) => ({
      cls: ind.cls,
      pct: accPercent(ind.vAccSum, ind.vAccCount, ind.threshold) || 0,
    }));
    const evt = { marker: 'aiScope', event: 'video_summary', classes };
    if (aiModel) evt.model = aiModel;
    window.MvrOverlay?.injectTimelineEvent(JSON.stringify(evt));
  }

  // Drive the per-video accumulator's lifecycle off the recording events. Pause
  // and stop both inject the per-video summary and revert the display; only stop
  // resets the accumulator (pause keeps it so resume continues it).
  function handleRecordingAcc(evName) {
    switch (evName) {
      case 'rec_start':
        resetVideoAcc();
        setRecording(true);
        break;
      case 'rec_resume':
        setRecording(true);
        break;
      case 'rec_pause':
        if (recordingActive) injectVideoAccEvent();
        setRecording(false);
        break;
      case 'rec_stop':
        if (recordingActive) injectVideoAccEvent();
        setRecording(false);
        resetVideoAcc();
        break;
    }
  }

  function handleStudyEvent(ev) {
    if (!ev || typeof ev.ev !== 'string') return;
    // A new study invalidates the prior study's collected events. (The connect
    // replay buffer can include the tail of a just-ended study; resetting here
    // keeps the buffer scoped to the current study.)
    if (ev.ev === 'study_start') {
      recordingEvents.length = 0;
      setRecording(false);
      resetVideoAcc();
      if (aiGraph) drawGraph(aiGraph); // clear any spans from the previous study
      return;
    }
    if (RECORDING_EVENT_NAMES.has(ev.ev)) {
      recordingEvents.push(ev);         // keep the raw event; `ts` is its timebase
      handleRecordingAcc(ev.ev);        // advance the per-video accumulator state
      if (aiGraph) drawGraph(aiGraph);  // reflect the new span/tick immediately
    }
  }

  function startStudyStream() {
    if (!window.EventSource) return; // no SSE support — nothing to collect
    const es = new EventSource('/study/events');
    es.onmessage = (e) => {
      let ev;
      try {
        ev = JSON.parse(e.data); // one timeline event object per message
      } catch (_) {
        return; // ignore malformed events
      }
      handleStudyEvent(ev);
    };
    // onerror is non-fatal: EventSource reconnects (and resumes via Last-Event-ID).
  }

  // Kick off: load the config and build the menus, then open both SSE streams.
  init().then(() => { startAiStream(); startStudyStream(); });
</script>
</body>
</html>
