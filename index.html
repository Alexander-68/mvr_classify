<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Toggle Button Test</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    border: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    touch-action: manipulation;
  }

  #stage {
    position: fixed;
    inset: 0;
  }

  canvas {
    position: absolute;
    inset: 0;
    display: block;
    border: 0;
    outline: none;
    background: transparent;
  }

  /* A cluster is a vertical stack of buttons that drags and zooms as one unit.
     Position is held in explicit left/top; zoom is a top-left-anchored scale so
     the origin stays put while the cluster grows/shrinks. */
  .cluster {
    position: absolute;
    display: flex;
    flex-direction: column;
    gap: 0;
    transform-origin: top left;
    touch-action: none;
    cursor: grab;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .cluster.dragging {
    cursor: grabbing;
  }

  /* Every button in a cluster is the same size. font-size/weight are constant
     (they drive layout), so the box never changes; emphasis is done purely with
     a transform on the inner label, which doesn't affect layout. */
  .cluster button {
    padding: 12px 10px;
    border: 2px solid rgba(255, 255, 255, 0.9);
    border-radius: 0;
    background: transparent;
    color: #fff;
    font-family: system-ui, sans-serif;
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
    overflow: hidden; /* guard: enlarged selected label stays within the box */
    touch-action: none;
    cursor: inherit;
  }

  /* Stack tight: buttons share an edge — one button's bottom outline is the
     next button's top outline. The -2px margin overlaps the two borders into a
     single line while every button keeps the same box size. Only the cluster's
     outer corners are rounded. */
  .cluster button:not(:first-child) {
    margin-top: -2px;
  }
  .cluster button:first-child {
    border-top-left-radius: 10px;
    border-top-right-radius: 10px;
  }
  .cluster button:last-child {
    border-bottom-left-radius: 10px;
    border-bottom-right-radius: 10px;
  }

  /* Horizontal mode: same buttons laid out in a row instead of a column. The
     tight-stacking trick is mirrored onto the X axis — the -2px shared edge
     moves to the left, and the rounded corners move to the row's two ends. */
  .cluster.horizontal {
    flex-direction: row;
  }
  .cluster.horizontal button:not(:first-child) {
    margin-top: 0;
    margin-left: -2px;
  }
  .cluster.horizontal button:first-child {
    border-radius: 0;
    border-top-left-radius: 10px;
    border-bottom-left-radius: 10px;
  }
  .cluster.horizontal button:last-child {
    border-radius: 0;
    border-top-right-radius: 10px;
    border-bottom-right-radius: 10px;
  }

  .cluster button .label {
    display: inline-block;
    transform-origin: center;
    transform: scale(0.8); /* idle: text sits smaller inside the button */
    transition: transform 0.12s ease;
  }

  .cluster button.selected {
    /* raise above neighbors so the whole yellow outline shows (the shared
       edges would otherwise be overpainted by the adjacent buttons' borders) */
    position: relative;
    z-index: 1;
    color: #ffdd00; /* selected: yellow text + yellow border */
    border-color: #ffdd00;
  }

  .cluster button.selected .label {
    /* enlarge the text within the same button area; fake-bold via an extra
       glyph-hugging shadow so the font-weight (and thus layout) stays fixed */
    transform: scale(1);
    text-shadow: 0 0 1px #ffdd00, 0 1px 3px rgba(0, 0, 0, 0.9);
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="canvas"></canvas>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(window.innerWidth * dpr);
    canvas.height = Math.round(window.innerHeight * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const stage = document.getElementById('stage');

  // Synthesize a short tone with the Web Audio API (no external assets). The
  // context is created lazily so it's unlocked by the user's tap gesture.
  let audioCtx = null;
  function playTone(freq) {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      audioCtx = audioCtx || new Ctx();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(1.0, now + 0.01); // 0 dBFS peak
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);

      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.36);
    } catch (_) {
      // Audio is best-effort; ignore failures (e.g. autoplay restrictions).
    }
  }

  // "ding" — a button was selected. "dong" — an octave lower, a long-press
  // finished (deselected) a button.
  function playDing() { playTone(880); } // A5
  function playDong() { playTone(440); } // A4

  function clamp(value, min, max) {
    return Math.min(Math.max(value, min), max);
  }

  function dist(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
  }

  function midpoint(a, b) {
    return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
  }

  // Angle (radians) of the line from a to b. Used to measure the twist of a
  // two-finger gesture.
  function angleBetween(a, b) {
    return Math.atan2(b.y - a.y, b.x - a.x);
  }

  const DRAG_THRESHOLD = 6; // px of movement before a tap counts as a drag
  const LONG_PRESS_MS = 500; // hold this long (without moving) for a long-press
  const MIN_SCALE = 0.4;
  const MAX_SCALE = 5;
  const EDGE_FORCE = 40; // px of over-drag past an edge that snaps a cluster to it
  const TWIST_FLIP_RAD = 45 * Math.PI / 180; // two-finger twist to flip orientation

  // Registry of all clusters, used for the "clusters must not overlap" rule.
  const clusters = [];

  // A cluster's current on-screen box. offsetWidth/Height are the unscaled
  // layout size (transforms don't affect them), so multiply by the scale.
  function clusterRect(state) {
    const w = state.el.offsetWidth * state.scale;
    const h = state.el.offsetHeight * state.scale;
    return { l: state.left, t: state.top, r: state.left + w, b: state.top + h };
  }

  function rectsOverlap(a, b) {
    return a.l < b.r && a.r > b.l && a.t < b.b && a.b > b.t;
  }

  function hitsOtherCluster(state, rect) {
    for (const other of clusters) {
      if (other === state) continue;
      if (rectsOverlap(rect, clusterRect(other))) return true;
    }
    return false;
  }

  // Where a cluster docked to `edge` rests in the stack of OTHER clusters docked
  // to the same edge, given its horizontal span [l, l+w] and its own vertical
  // center (ourTop + ourH/2). For 'top' this is the floor to sit on (0, or the
  // bottom of an overlapping top-docked sibling); for 'bottom' it's the ceiling
  // to hang from (viewport bottom, or the top of an overlapping bottom-docked
  // sibling). Only siblings that overlap horizontally AND sit on the far side of
  // our center count, so a row rests against the sibling it's dragged toward
  // rather than both rows fighting to rest on each other. Rows side by side (no
  // X overlap) both sit flush against the edge.
  function dockAnchor(state, edge, l, w, ourTop, ourH) {
    const ourCenter = ourTop + ourH / 2;
    if (edge === 'top') {
      let floor = 0;
      for (const o of clusters) {
        if (o === state || o.dock !== 'top') continue;
        const ow = o.el.offsetWidth * o.scale, oh = o.el.offsetHeight * o.scale;
        const ol = o.left, or = o.left + ow;
        if (l < or && l + w > ol && o.top + oh / 2 < ourCenter) floor = Math.max(floor, o.top + oh);
      }
      return floor;
    }
    let ceil = window.innerHeight;
    for (const o of clusters) {
      if (o === state || o.dock !== 'bottom') continue;
      const ow = o.el.offsetWidth * o.scale, oh = o.el.offsetHeight * o.scale;
      const ol = o.left, or = o.left + ow;
      if (l < or && l + w > ol && o.top + oh / 2 > ourCenter) ceil = Math.min(ceil, o.top);
    }
    return ceil;
  }

  // Where a docked cluster pins along its edge: it slides freely along the edge
  // (following the finger) and is fixed on the perpendicular axis. Top/bottom
  // stack against same-edge siblings via dockAnchor; left/right just sit flush.
  function dockSlot(state, w, h, desiredL, desiredT) {
    const maxL = Math.max(0, window.innerWidth - w);
    const maxT = Math.max(0, window.innerHeight - h);
    if (state.dock === 'top') {
      const l = clamp(desiredL, 0, maxL);
      return { l, t: dockAnchor(state, 'top', l, w, desiredT, h) };
    }
    if (state.dock === 'bottom') {
      const l = clamp(desiredL, 0, maxL);
      return { l, t: dockAnchor(state, 'bottom', l, w, desiredT, h) - h };
    }
    if (state.dock === 'left') {
      return { l: 0, t: clamp(desiredT, 0, maxT) };
    }
    return { l: maxL, t: clamp(desiredT, 0, maxT) }; // right
  }

  // Clamp a cluster's top-left so its full (scaled) box stays inside the canvas.
  function clampIntoCanvas(state) {
    const w = state.el.offsetWidth * state.scale;
    const h = state.el.offsetHeight * state.scale;
    state.left = clamp(state.left, 0, Math.max(0, window.innerWidth - w));
    state.top = clamp(state.top, 0, Math.max(0, window.innerHeight - h));
  }

  // Persist each cluster's layout (position, zoom, orientation) across browser
  // sessions. Selection is intentionally NOT saved — clusters restore unselected.
  const STORAGE_KEY = 'mvr_clusters_v1';

  function saveLayout() {
    try {
      // Update in place (never drop entries) so a submenu's spot is remembered
      // after it closes and reused the next time it opens. savedLayout is kept in
      // sync with storage so a re-opened submenu reads its latest position.
      for (const c of clusters) {
        savedLayout[c.id] = {
          left: c.left, top: c.top, scale: c.scale,
          horizontal: c.horizontal, dock: c.dock,
        };
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(savedLayout));
    } catch (_) {
      // Storage is best-effort (private mode, quota); ignore failures.
    }
  }

  function loadLayout() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    } catch (_) {
      return {};
    }
  }

  const savedLayout = loadLayout();

  // Apply a saved layout to a freshly built cluster, re-clamping in case the
  // viewport is smaller than when it was saved. Returns whether a saved entry
  // was found (callers use this to skip default placement).
  function restoreLayout(state) {
    const s = savedLayout[state.id];
    if (!s) return false;
    if (s.horizontal) setOrientation(state, true); // reflows before we measure
    state.dock = s.dock ?? null;
    if (typeof s.scale === 'number') {
      const w0 = state.el.offsetWidth;
      const h0 = state.el.offsetHeight;
      const canvasMax = Math.min(window.innerWidth / w0, window.innerHeight / h0);
      state.scale = clamp(s.scale, MIN_SCALE, Math.min(MAX_SCALE, canvasMax));
    }
    if (typeof s.left === 'number') state.left = s.left;
    if (typeof s.top === 'number') state.top = s.top;
    clampIntoCanvas(state);
    apply(state);
    markHome(state);
    return true;
  }

  // Apply a zoom toward a focal point, capped so the box can't leave the canvas
  // or overlap another cluster. focalLocal is the focal point in the cluster's
  // own unscaled coordinates; focalScreen is where that point should stay.
  function applyZoom(state, desiredScale, focalScreenX, focalScreenY, focalLocalX, focalLocalY) {
    const w0 = state.el.offsetWidth;
    const h0 = state.el.offsetHeight;
    // Cap scale so the box can't exceed the canvas in either dimension.
    const canvasMax = Math.min(window.innerWidth / w0, window.innerHeight / h0);
    const newScale = clamp(desiredScale, MIN_SCALE, Math.min(MAX_SCALE, canvasMax));

    let nl = focalScreenX - newScale * focalLocalX;
    let nt = focalScreenY - newScale * focalLocalY;
    const w = w0 * newScale;
    const h = h0 * newScale;
    nl = clamp(nl, 0, Math.max(0, window.innerWidth - w));
    nt = clamp(nt, 0, Math.max(0, window.innerHeight - h));

    // Reject a zoom step that would overlap another cluster.
    if (hitsOtherCluster(state, { l: nl, t: nt, r: nl + w, b: nt + h })) return;

    state.scale = newScale;
    state.left = nl;
    state.top = nt;
    apply(state);
    markHome(state);
  }

  // Build one independent cluster from a list of button labels. `id` is a stable
  // key used to persist/restore this cluster's layout across sessions.
  function createCluster(id, labels, left, top, exclusive = true, transient = false) {
    const el = document.createElement('div');
    el.className = 'cluster';
    for (const label of labels) {
      const btn = document.createElement('button');
      btn.type = 'button';
      const span = document.createElement('span');
      span.className = 'label';
      span.textContent = label;
      btn.appendChild(span);
      el.appendChild(btn);
    }
    stage.appendChild(el);

    const state = {
      el,
      id,
      left,
      top,
      homeLeft: left, // intended position; where the cluster returns to after a
      homeTop: top,   // transient viewport shrink (e.g. on-screen keyboard)
      scale: 1,
      horizontal: false,   // orientation, persisted; a row when true, else a column.
                           // Set by a two-finger twist or by docking (which lays
                           // the cluster along its edge); it is sticky otherwise.
      dock: null,          // 'top' | 'bottom' | 'left' | 'right' | null — docked edge.
                           // top/bottom force a row, left/right force a column.
      exclusive,            // true: one selection per cluster; false: independent
      transient,            // true: a pop-up submenu — not built at page load and
                            // its selection is discarded, but its position persists
      markerOverride: null, // when set, buttons inject {marker, modifier} events
      selected: null,       // last-selected button (only meaningful when exclusive)
      pointers: new Map(), // pointerId -> {x, y}
      mode: null,          // null (pending) | 'drag' | 'pinch'
      tapButton: null,
      moved: false,
      longPress: false,      // did the single-pointer hold cross LONG_PRESS_MS?
      longPressTimer: null,
      holdActionDone: false, // did the long-hold already open/close a submenu?
      dragLocked: false,     // once a submenu spawned mid-hold, don't drag parent
      startX: 0, startY: 0,
      startLeft: 0, startTop: 0,
      pinchStartDist: 0, pinchStartScale: 1,
      pinchStartAngle: 0,   // two-finger angle baseline, re-based after each flip
      focalX: 0, focalY: 0, // pinch focal point in cluster-local (pre-scale) coords
    };

    apply(state);
    setupCluster(state);
    clusters.push(state);
    state.restored = transient ? false : restoreLayout(state); // saved layout
    return state;
  }

  function apply(state) {
    state.el.style.left = `${state.left}px`;
    state.el.style.top = `${state.top}px`;
    state.el.style.transform = `scale(${state.scale})`;
  }

  // Remember a cluster's current position as its "home" — the spot it returns to
  // once a transient viewport shrink (the on-screen keyboard) that clamped it
  // inward goes away. Only real gestures call this; resize clamping never does,
  // so the intended position survives the keyboard.
  function markHome(state) {
    state.homeLeft = state.left;
    state.homeTop = state.top;
  }

  // Toggle a cluster between the default vertical stack and a horizontal row.
  // Adding/removing the class reflows the element synchronously, so callers can
  // re-measure offsetWidth/Height right after to reposition against the change.
  function setOrientation(state, horizontal) {
    if (state.horizontal === horizontal) return;
    state.horizontal = horizontal;
    state.el.classList.toggle('horizontal', horizontal);
  }

  // Record an interaction on the active study's timeline. The marker is the
  // button's label text; `status`, when given, tags how the (de)selection
  // happened. Best-effort and a no-op off-device.
  function injectEvent(state, btn, status) {
    const label = btn.querySelector('.label')?.textContent ?? btn.textContent;
    // A submenu cluster fixes the marker to its host button's label and reports
    // its own button as a `modifier`; ordinary clusters use the button as marker.
    const evt = state.markerOverride
      ? { marker: state.markerOverride, modifier: label }
      : { marker: label };
    if (status) evt.status = status;
    window.MvrOverlay?.injectTimelineEvent(JSON.stringify(evt));
  }

  // Select a button (ding). `status` is 'on' for a long-press select and
  // omitted for a plain short-tap select.
  function selectButton(state, btn, status) {
    // Exclusive clusters keep a single selection (clear the previous one);
    // non-exclusive clusters let each button toggle independently. Selection only
    // scales the label text, so the button box and cluster layout don't change.
    if (state.exclusive && state.selected && state.selected !== btn) {
      state.selected.classList.remove('selected');
    }
    btn.classList.add('selected');
    state.selected = btn;
    // Fire the ding off the critical path so the selected state paints
    // immediately — rapid taps stay responsive and we don't wait on audio.
    setTimeout(playDing, 0);
    injectEvent(state, btn, status);
  }

  // Deselect the already-selected button (dong). `status` is 'finish' for a
  // short-tap unselect and 'off' for a long-press unselect.
  function unselectButton(state, btn, status) {
    btn.classList.remove('selected');
    if (state.selected === btn) state.selected = null;
    setTimeout(playDong, 0);
    injectEvent(state, btn, status);
  }

  // Cancel a pending long-press timer (a drag or a second finger disqualifies
  // the hold). Leaves state.longPress as-is; callers reset it where needed.
  function clearLongPress(state) {
    if (state.longPressTimer) {
      clearTimeout(state.longPressTimer);
      state.longPressTimer = null;
    }
  }

  // The long-press timer fired while the finger is still down. The whole
  // long-press resolves right here — mid-hold — so there's immediate feedback
  // and no guessing how long to hold or waiting for release. A submenu host pops
  // its submenu open (or tears it down); every other button just toggles its own
  // selection with an on/off status. Once resolved, the press is committed: the
  // parent cluster can no longer be dragged by this gesture (dragLocked) and
  // pointer-up won't re-toggle it (holdActionDone). To reposition instead, start
  // dragging before the threshold — an early drag cancels this timer.
  function fireLongPress(state) {
    state.longPress = true;
    // Only a clean single-finger hold on a button qualifies.
    if (state.mode === 'drag' || state.mode === 'pinch') return;
    if (state.pointers.size !== 1) return;
    const btn = state.tapButton;
    if (!btn) return;
    const host = submenuHosts.get(btn);
    if (host) {
      if (btn.classList.contains('selected') && host.submenu) {
        // Already open: a fresh long-hold tears it down.
        unselectButton(state, btn, 'off');
        closeSubmenu(host);
      } else {
        // Pop the submenu open now, while still pressing.
        selectButton(state, btn, 'on');
        openSubmenu(host);
      }
    } else if (btn.classList.contains('selected')) {
      unselectButton(state, btn, 'off');
    } else {
      selectButton(state, btn, 'on');
    }
    state.holdActionDone = true;
    state.dragLocked = true;
  }

  // (Re)establish the two-finger baseline: current spread (for zoom), angle (for
  // twist), and focal point (kept pinned under the fingers' midpoint). Called at
  // the start of a pinch and again after a twist-flip so zoom and twist continue
  // smoothly across the orientation change.
  function rebasePinch(state) {
    const [p0, p1] = [...state.pointers.values()];
    const m = midpoint(p0, p1);
    state.pinchStartDist = dist(p0, p1) || 1;
    state.pinchStartScale = state.scale;
    state.pinchStartAngle = angleBetween(p0, p1);
    state.focalX = (m.x - state.left) / state.scale;
    state.focalY = (m.y - state.top) / state.scale;
  }

  function beginPinch(state) {
    state.mode = 'pinch';
    state.tapButton = null;
    state.el.classList.remove('dragging');
    clearLongPress(state);
    state.longPress = false;
    // A two-finger gesture is free-form manipulation (zoom / twist / move), so
    // the cluster leaves any docked edge. Its orientation stays put (sticky) —
    // only a deliberate twist changes it.
    state.dock = null;
    rebasePinch(state);
  }

  // A two-finger twist past TWIST_FLIP_RAD flips orientation (row <-> column).
  // The reflow changes the box size, so re-clamp into the canvas and re-base the
  // pinch to the new geometry, then carry on within the same gesture.
  function twistDuringPinch(state) {
    const [p0, p1] = [...state.pointers.values()];
    let dA = angleBetween(p0, p1) - state.pinchStartAngle;
    dA = Math.atan2(Math.sin(dA), Math.cos(dA)); // wrap to [-PI, PI]
    if (Math.abs(dA) < TWIST_FLIP_RAD) return;
    setOrientation(state, !state.horizontal);
    clampIntoCanvas(state);
    apply(state);
    markHome(state);
    rebasePinch(state); // fresh geometry + twist baseline for the next flip
  }

  function setupCluster(state) {
    const el = state.el;

    el.addEventListener('pointerdown', (e) => {
      // Claim this gesture for the web UI so the native layer doesn't treat it
      // as a click-through to the camera controls underneath.
      window.MvrOverlay?.reportInteractive();
      el.setPointerCapture(e.pointerId);
      state.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

      if (state.pointers.size === 1) {
        state.mode = null;
        state.moved = false;
        state.tapButton = e.target.closest('button');
        state.startX = e.clientX;
        state.startY = e.clientY;
        state.startLeft = state.left;
        state.startTop = state.top;
        // Start the long-press clock; a drag or second finger cancels it. When
        // it fires (finger still down, no drag), a submenu host pops its submenu
        // open right then — see fireLongPress.
        state.longPress = false;
        state.holdActionDone = false;
        state.dragLocked = false;
        clearLongPress(state);
        state.longPressTimer = setTimeout(() => fireLongPress(state), LONG_PRESS_MS);
      } else if (state.pointers.size === 2) {
        beginPinch(state);
      }
    });

    el.addEventListener('pointermove', (e) => {
      const p = state.pointers.get(e.pointerId);
      if (!p) return;
      p.x = e.clientX;
      p.y = e.clientY;

      if (state.mode === 'pinch' && state.pointers.size >= 2) {
        const [p0, p1] = [...state.pointers.values()];
        const m = midpoint(p0, p1);
        // Twist flips orientation (and re-bases the pinch); spread zooms; the
        // midpoint translates. All three can happen in one two-finger gesture.
        twistDuringPinch(state);
        const ratio = dist(p0, p1) / state.pinchStartDist;
        // Keep the focal point pinned under the fingers' midpoint.
        applyZoom(state, state.pinchStartScale * ratio, m.x, m.y, state.focalX, state.focalY);
        return;
      }

      if (state.pointers.size === 1) {
        const dx = e.clientX - state.startX;
        const dy = e.clientY - state.startY;
        if (!state.moved && !state.dragLocked && Math.hypot(dx, dy) > DRAG_THRESHOLD) {
          state.moved = true;
          state.mode = 'drag';
          el.classList.add('dragging');
          clearLongPress(state); // a drag is not a hold
          state.longPress = false;
        }
        if (state.mode === 'drag') {
          let w = el.offsetWidth * state.scale;
          let h = el.offsetHeight * state.scale;
          const desiredL = state.startLeft + dx;
          const desiredT = state.startTop + dy;

          // --- Dock a free cluster: shove one of its edges off-screen by
          // EDGE_FORCE to snap it to that edge. Docking lays the cluster ALONG
          // the edge — top/bottom => a horizontal row, left/right => a vertical
          // column — so orientation follows the edge (and stays that way after,
          // sticky). The largest overshoot wins so a corner picks one edge.
          if (state.dock === null) {
            const overTop    = Math.max(0, -desiredT);
            const overBottom = Math.max(0, desiredT + h - window.innerHeight);
            const overLeft   = Math.max(0, -desiredL);
            const overRight  = Math.max(0, desiredL + w - window.innerWidth);
            let pick = null; // [edge, horizontal, overshoot]
            for (const c of [['top', true, overTop], ['bottom', true, overBottom],
                             ['left', false, overLeft], ['right', false, overRight]]) {
              if (c[2] > EDGE_FORCE && (!pick || c[2] > pick[2])) pick = c;
            }
            if (pick) {
              setOrientation(state, pick[1]); // reflows synchronously
              state.dock = pick[0];
              w = el.offsetWidth * state.scale; // re-measure the flipped box
              h = el.offsetHeight * state.scale;
              // Snap to the edge and re-base the drag onto that pinned spot, so
              // further motion (and the undock test) is measured from the dock.
              const slot = dockSlot(state, w, h, desiredL, desiredT);
              state.left = slot.l; state.top = slot.t;
              state.startX = e.clientX; state.startY = e.clientY;
              state.startLeft = slot.l; state.startTop = slot.t;
              apply(state);
              return; // settle the snap this frame; resume dragging next move
            }
          }

          let pL, pT;
          if (state.dock === null) {
            pL = clamp(desiredL, 0, Math.max(0, window.innerWidth - w));
            pT = clamp(desiredT, 0, Math.max(0, window.innerHeight - h));
          } else {
            // Docked: pin along the edge (sliding to follow the finger), and
            // undock once the finger pulls the box off that edge by more than
            // EDGE_FORCE. Undocking keeps the orientation (sticky).
            const slot = dockSlot(state, w, h, desiredL, desiredT);
            const off =
              state.dock === 'top'    ? desiredT - slot.t :
              state.dock === 'bottom' ? slot.t - desiredT :
              state.dock === 'left'   ? desiredL - slot.l :
                                        slot.l - desiredL;
            if (off > EDGE_FORCE) {
              state.dock = null;
              pL = clamp(desiredL, 0, Math.max(0, window.innerWidth - w));
              pT = clamp(desiredT, 0, Math.max(0, window.innerHeight - h));
            } else {
              pL = clamp(slot.l, 0, Math.max(0, window.innerWidth - w));
              pT = clamp(slot.t, 0, Math.max(0, window.innerHeight - h));
            }
          }

          const fits = (l, t) => !hitsOtherCluster(state, { l, t, r: l + w, b: t + h });
          // Slide along whichever axis stays clear so clusters never overlap.
          if (fits(pL, pT)) { state.left = pL; state.top = pT; }
          else if (fits(pL, state.top)) { state.left = pL; }
          else if (fits(state.left, pT)) { state.top = pT; }
          apply(state);
        }
      }
    });

    function onUp(e) {
      if (!state.pointers.has(e.pointerId)) return;
      state.pointers.delete(e.pointerId);
      try { el.releasePointerCapture(e.pointerId); } catch (_) {}

      // Pinch -> single finger: keep dragging with the remaining pointer,
      // rebasing so the cluster doesn't jump.
      if (state.pointers.size === 1 && state.mode === 'pinch') {
        const pt = [...state.pointers.values()][0];
        state.mode = 'drag';
        state.moved = true;
        state.startX = pt.x;
        state.startY = pt.y;
        state.startLeft = state.left;
        state.startTop = state.top;
        return;
      }

      if (state.pointers.size === 0) {
        clearLongPress(state);
        const wasTap = state.mode !== 'drag' && state.mode !== 'pinch';
        const handledOnHold = state.holdActionDone;
        const btn = state.tapButton;
        el.classList.remove('dragging');
        state.mode = null;
        state.tapButton = null;
        state.moved = false;
        state.longPress = false;
        state.holdActionDone = false;
        state.dragLocked = false;
        if (handledOnHold) {
          // The long-hold already opened/closed the submenu while pressing and
          // locked out the drag, so the parent didn't move — nothing to do here.
          return;
        }
        if (wasTap && btn) {
          // Only short taps reach here — every long-press resolves mid-hold in
          // fireLongPress. A short tap on a selected button deselects it and
          // finishes with "finish" (dong), tearing down a host's submenu too;
          // on an unselected button it selects bare (ding, no status/submenu).
          const host = submenuHosts.get(btn);
          if (host) {
            if (btn.classList.contains('selected')) {
              unselectButton(state, btn, 'finish');
              closeSubmenu(host);
            } else {
              selectButton(state, btn, undefined);
            }
          } else if (btn.classList.contains('selected')) {
            unselectButton(state, btn, 'finish');
          } else {
            selectButton(state, btn, undefined);
          }
        } else {
          markHome(state);  // a drag/pinch set a new intended position
          saveLayout();     // persist the changed layout
        }
      }
    }
    el.addEventListener('pointerup', onUp);
    el.addEventListener('pointercancel', onUp);

    // Mouse-wheel zoom, focused on the cursor position.
    el.addEventListener('wheel', (e) => {
      e.preventDefault();
      window.MvrOverlay?.reportInteractive();
      const factor = Math.exp(-e.deltaY * 0.0015);
      const localX = (e.clientX - state.left) / state.scale;
      const localY = (e.clientY - state.top) / state.scale;
      applyZoom(state, state.scale * factor, e.clientX, e.clientY, localX, localY);
      saveLayout();
    }, { passive: false });
  }

  // --- Modifier submenus ---------------------------------------------------
  // A host button can pop open an exclusive submenu of modifiers on long-press.
  // Its buttons inject {marker:<host>, modifier:<label>, status?} rather than
  // their own label as the marker. Each submenu is transient: created on open,
  // and destroyed (its selection discarded) as soon as the host is deselected.
  // It reuses createCluster, so it drags/pinches and calls reportInteractive()
  // like any other cluster. Hosts are registered from the config's `submenus`
  // map (host label -> modifier labels) in buildFromConfig(), keyed to the
  // button (in whichever built cluster holds it) whose label matches the key.
  const submenuHosts = new Map();

  // Register a host: find the button across all built clusters whose label
  // matches `label`, then map it to a config carrying its live submenu (null
  // when closed) and the cluster that owns it (used to anchor submenu spawn
  // placement). `id` is the submenu's stable layout-persistence key — deriving
  // it from the label keeps saved positions stable across reloads.
  function registerSubmenu(builtClusters, label, modifiers) {
    for (const cl of builtClusters) {
      const btn = [...cl.el.querySelectorAll('button')]
        .find((b) => b.textContent.trim() === label);
      if (btn) {
        const id = label.toLowerCase().replace(/[^a-z0-9]+/g, '-') + '-modifier';
        submenuHosts.set(btn, { marker: label, id, modifiers, submenu: null, cluster: cl });
        return;
      }
    }
  }

  // Build the clusters and submenus from a loaded config object. A cluster's
  // `exclusive` defaults to true (matches the original single-select "segments"
  // cluster); set it false in the config for independent multi-select. Optional
  // per-cluster `left`/`top` override the default spawn spot.
  function buildFromConfig(config) {
    const built = [];
    for (const c of (config.clusters || [])) {
      built.push(createCluster(
        c.id, c.buttons || [],
        typeof c.left === 'number' ? c.left : 40,
        typeof c.top === 'number' ? c.top : 100,
        c.exclusive !== false,
      ));
    }

    // Fresh-start placement: keep the first cluster at its default spot and push
    // each later cluster toward the right edge, clear of the first, so they don't
    // start out overlapping. Skipped for a cluster restored from a saved layout
    // or given an explicit position in the config.
    const first = built[0];
    for (let i = 1; i < built.length && first; i++) {
      const c = built[i];
      if (c.restored || typeof config.clusters[i].left === 'number') continue;
      c.left = Math.max(
        first.left + first.el.offsetWidth + 24,
        window.innerWidth - c.el.offsetWidth - 40,
      );
      clampIntoCanvas(c);
      apply(c);
      markHome(c);
    }

    // Each key in `submenus` is a host button's label; the value is its modifiers.
    for (const [label, modifiers] of Object.entries(config.submenus || {})) {
      registerSubmenu(built, label, modifiers);
    }
  }

  // Fail-loud banner shown when the config can't be loaded. The file is the sole
  // source of menu content, so on failure we say why rather than come up blank.
  function showConfigError(err) {
    const box = document.createElement('div');
    box.style.cssText = [
      'position:fixed', 'left:50%', 'top:50%', 'transform:translate(-50%,-50%)',
      'max-width:80vw', 'padding:16px 20px', 'border:2px solid #ffdd00',
      'border-radius:10px', 'background:rgba(0,0,0,0.75)', 'color:#fff',
      'font-family:system-ui,sans-serif', 'font-size:16px', 'line-height:1.4',
      'text-align:center', 'z-index:9999', 'pointer-events:none',
    ].join(';');
    box.textContent = `Could not load mvr_annotate.json — ${err.message}`;
    stage.appendChild(box);
  }

  // Load the menu content (clusters + submenus), then build the UI. The config
  // file is the single source of truth: if it can't be fetched or parsed, fail
  // loud (show the error, build nothing) rather than guess a layout.
  async function init() {
    let config;
    try {
      const res = await fetch('mvr_annotate.json', { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      config = await res.json();
    } catch (err) {
      showConfigError(err);
      return;
    }
    buildFromConfig(config);
  }

  // Position a freshly opened submenu in open space that doesn't overlap any
  // other cluster: preferring beside its host (right, then left, then below /
  // above), then scanning the whole canvas for any clear slot, and finally —
  // only if nothing is clear — sitting beside the host anyway.
  function placeSubmenuInOpenSpace(sub, host) {
    const gap = 16;
    const w = sub.el.offsetWidth * sub.scale;
    const h = sub.el.offsetHeight * sub.scale;
    const hostW = host.el.offsetWidth * host.scale;
    const hostH = host.el.offsetHeight * host.scale;
    const maxL = Math.max(0, window.innerWidth - w);
    const maxT = Math.max(0, window.innerHeight - h);
    const fits = (l, t) => !hitsOtherCluster(sub, { l, t, r: l + w, b: t + h });
    const place = (l, t) => { sub.left = clamp(l, 0, maxL); sub.top = clamp(t, 0, maxT); };

    // Preferred anchors beside/around the host.
    const anchors = [
      [host.left + hostW + gap, host.top],   // right
      [host.left - w - gap, host.top],       // left
      [host.left, host.top + hostH + gap],   // below
      [host.left, host.top - h - gap],       // above
    ];
    for (const [l, t] of anchors) {
      const cl = clamp(l, 0, maxL), ct = clamp(t, 0, maxT);
      if (fits(cl, ct)) { place(cl, ct); return; }
    }
    // Grid scan for any open slot anywhere on the canvas.
    for (let t = 0; t <= maxT; t += 24) {
      for (let l = 0; l <= maxL; l += 24) {
        if (fits(l, t)) { place(l, t); return; }
      }
    }
    // Nothing clear — sit beside the host (right if it fits, else left).
    let l = host.left + hostW + gap;
    if (l + w > window.innerWidth) l = host.left - w - gap;
    place(l, host.top);
  }

  function openSubmenu(host) {
    if (host.submenu) return; // already open
    const sub = createCluster(host.id, host.modifiers, 0, 0, true, true);
    sub.markerOverride = host.marker;
    host.submenu = sub;
    // Reopen at the saved spot when we have one and it's still clear; otherwise
    // find open space beside the host. Persist the chosen spot either way so it
    // is remembered next time.
    if (!restoreLayout(sub) || hitsOtherCluster(sub, clusterRect(sub))) {
      placeSubmenuInOpenSpace(sub, host.cluster);
      clampIntoCanvas(sub);
      apply(sub);
      markHome(sub);
    }
    saveLayout();
  }

  function closeSubmenu(host) {
    if (!host.submenu) return;
    const i = clusters.indexOf(host.submenu);
    if (i !== -1) clusters.splice(i, 1);
    host.submenu.el.remove();
    host.submenu = null;
  }

  // Re-derive a cluster's on-screen position from its intended "home", clamped
  // into the current viewport. Docked clusters re-pin to their edge (and restack)
  // so they ride flush with a shrinking bottom rather than floating into the
  // middle. Home itself is never touched here, so growing the viewport back
  // (keyboard closing) returns every cluster to exactly where it was left.
  function reflowIntoViewport(c) {
    const w = c.el.offsetWidth * c.scale;
    const h = c.el.offsetHeight * c.scale;
    const maxL = Math.max(0, window.innerWidth - w);
    const maxT = Math.max(0, window.innerHeight - h);
    if (c.dock === 'top') {
      c.left = clamp(c.homeLeft, 0, maxL);
      c.top = clamp(dockAnchor(c, 'top', c.left, w, c.homeTop, h), 0, maxT);
    } else if (c.dock === 'bottom') {
      c.left = clamp(c.homeLeft, 0, maxL);
      c.top = clamp(dockAnchor(c, 'bottom', c.left, w, c.homeTop, h) - h, 0, maxT);
    } else if (c.dock === 'left') {
      c.left = 0;
      c.top = clamp(c.homeTop, 0, maxT);
    } else if (c.dock === 'right') {
      c.left = maxL;
      c.top = clamp(c.homeTop, 0, maxT);
    } else {
      c.left = clamp(c.homeLeft, 0, maxL);
      c.top = clamp(c.homeTop, 0, maxT);
    }
  }

  // On viewport resize (including the on-screen keyboard opening/closing), reflow
  // every cluster from its home. Two passes let stacked docked clusters settle
  // against each other regardless of iteration order.
  window.addEventListener('resize', () => {
    for (let pass = 0; pass < 2; pass++) {
      for (const c of clusters) reflowIntoViewport(c);
    }
    for (const c of clusters) apply(c);
  });

  // Kick off: load the config, then build the menus.
  init();
</script>
</body>
</html>
